              <svg class="w-5 h-5 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <span class="break-all">${userData.email}</span>
            </div>
            <div class="flex items-center gap-3 text-gray-300 text-sm md:text-base">
              <svg class="w-5 h-5 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1 19.79 19.79 0 0 1 1.59 4.48 2 2 0 0 1 3.56 2.25h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span>${userData.phone}</span>
            </div>
            <div class="flex items-center gap-3 text-gray-300 text-sm md:text-base">
              <svg class="w-5 h-5 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
              <span>${userData.birthday}</span>
            </div>
            <div class="flex items-center gap-3 text-gray-300 text-sm md:text-base">
              <svg class="w-5 h-5 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>${userData.address}</span>
            </div>
          </div>
        </div>
        <div class="bg-[#1a2128] border border-gray-800 rounded-lg p-4 md:p-6">
          <h3 class="text-white text-lg font-semibold mb-4">Banking Details</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3 text-gray-300 text-sm md:text-base">
              <svg class="w-5 h-5 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
              <span>**** **** **** 1234</span>
            </div>
            <div class="flex items-center gap-3 text-gray-300 text-sm md:text-base">
              <svg class="w-5 h-5 text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m2 7 10-5 10 5v13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1Z"/><path d="M12 22V12"/><path d="M2 7h20"/></svg>
              <span>KB Bank</span>
            </div>
            <button class="text-[#98E7D2] hover:text-[#CBE8E4] text-sm transition-colors">+ Add New Bank Account</button>
          </div>
        </div>
      </div>
      <!-- Recent Transactions -->
      <div class="bg-[#1a2128] border border-gray-800 rounded-lg p-4 md:p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
          <h3 class="text-white text-lg font-semibold">Recent Transactions</h3>
          <button class="text-[#98E7D2] hover:text-[#CBE8E4] text-sm transition-colors text-left md:text-right">View More Records →</button>
        </div>
        <!-- Mobile card view -->
        <div class="md:hidden space-y-4">
          ${transactions.map(t => `
            <div class="bg-[#0f1419] border border-gray-800 rounded-lg p-4">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="text-white font-semibold">${t.type}</p>
                  <p class="text-gray-400 text-sm">${t.date} ${t.time}</p>
                </div>
                <span class="bg-green-400 text-gray-900 px-3 py-1 rounded-full text-xs font-semibold">${t.status}</span>
              </div>
              <p class="text-lg font-semibold ${t.amount.startsWith('+') ? 'text-green-400' : 'text-red-400'}">${t.amount}</p>
            </div>`).join('')}
        </div>
        <!-- Desktop table view -->
        <div class="hidden md:block overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="border-b border-gray-800">
                <th class="text-left text-gray-400 text-sm py-3 px-4">Type</th>
                <th class="text-left text-gray-400 text-sm py-3 px-4">Amount</th>
                <th class="text-left text-gray-400 text-sm py-3 px-4">Date</th>
                <th class="text-left text-gray-400 text-sm py-3 px-4">Time</th>
                <th class="text-left text-gray-400 text-sm py-3 px-4">Status</th>
              </tr>
            </thead>
            <tbody>
              ${transactions.map(t => `
                <tr class="border-b border-gray-800 hover:bg-[#0f1419] transition-colors">
                  <td class="text-white py-4 px-4">${t.type}</td>
                  <td class="py-4 px-4 font-semibold ${t.amount.startsWith('+') ? 'text-green-400' : 'text-red-400'}">${t.amount}</td>
                  <td class="text-gray-300 py-4 px-4">${t.date}</td>
                  <td class="text-gray-300 py-4 px-4">${t.time}</td>
                  <td class="py-4 px-4"><span class="bg-green-400 text-gray-900 px-3 py-1 rounded-full text-xs font-semibold">${t.status}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  ${renderBottomNav()}`;
}

function pageAccountComingSoon(title) {
  return `
  ${renderSubHeader()}
  <div class="flex bg-[#0f1419] min-h-screen pb-16 md:pb-0">
    ${renderSidebar()}
    <main class="flex-1 p-4 md:p-8 flex items-center justify-center">
      <div class="text-center">
        <p class="text-6xl mb-4">🚧</p>
        <h2 class="text-white text-2xl font-bold mb-2">${title}</h2>
        <p class="text-gray-400">Coming Soon</p>
      </div>
    </main>
  </div>
  ${renderBottomNav()}`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const p = state.page;
  let html = '';
  if (p === '')                html = pageHome();
  else if (p === 'hot-games')  html = pageHotGames();
  else if (p === 'mini-games') html = pageMiniGames();
  else if (p === 'sport')      html = pageComingSoon('SPORTS BETTING', 'from-blue-600 via-green-500 to-yellow-500');
  else if (p === 'fish')       html = pageComingSoon('FISHING GAMES',  'from-blue-600 via-cyan-500 to-teal-500');
  else if (p === 'slot')       html = pageComingSoon('SLOT MACHINES',  'from-red-600 via-pink-500 to-purple-500');
  else if (p === 'promotion')  html = pagePromotion();
  else if (p === 'deposit')    html = pageDeposit();
  else if (p === 'withdrawal') html = pageWithdrawal();
  else if (p === 'account')    html = pageAccount();
  else if (p === 'betting-record')    html = pageAccountComingSoon('Betting Record');
  else if (p === 'deposit-record')    html = pageAccountComingSoon('Deposit Record');
  else if (p === 'withdrawal-record') html = pageAccountComingSoon('Withdrawal Record');
  else if (p === 'profit-loss')       html = pageAccountComingSoon('Profit And Loss');
  else if (p === 'account-record')    html = pageAccountComingSoon('Account Record');
  else if (p === 'personal-info')     html = pageAccountComingSoon('Personal Info');
  else if (p === 'security')          html = pageAccountComingSoon('Security Center');
  else if (p === 'support')           html = pageAccountComingSoon('Customer Service');
  else html = pageHome();

  document.getElementById('app').innerHTML = html;
  window.scrollTo(0, 0);
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function setBannerIndex(i) {
  state.bannerIndex = i;
  render();
}

function toggleMobileMenu() {
  state.mobileMenuOpen = !state.mobileMenuOpen;
  render();
}

function toggleMobileSidebar() {
  state.mobileSidebarOpen = !state.mobileSidebarOpen;
  render();
}

function setGameCat(i) {
  state.gameCatIndex = i;
  state.gameCatProgress = 0;
  render();
}

function setMiniCat(cat) {
  state.miniCat = cat;
  render();
}

function setPromoTab(tab) {
  state.promoTab = tab;
  render();
}

function setHomePromoTab(tab) {
  state.homePromoTab = tab;
  render();
}

function setDepositAmount(a) {
  state.depositAmount = a;
  state.depositCustom = '';
  render();
}

function setDepositCustom(v) {
  state.depositCustom = v;
  state.depositAmount = '';
}

function setDepositPromo(id) {
  state.depositPromo = state.depositPromo === id ? '' : id;
  render();
}

function togglePassword() {
  state.showPassword = !state.showPassword;
  render();
}

// ============================================================
// TIMERS
// ============================================================
setInterval(() => {
  state.bannerIndex = (state.bannerIndex + 1) % banners.length;
  const app = document.getElementById('app');
  if (app && state.page === '') {
    const bannerEl = app.querySelector('section');
    if (bannerEl) bannerEl.outerHTML = renderBanner();
  }
}, 5000);

setInterval(() => {
  state.gameCatProgress = state.gameCatProgress >= 100 ? 0 : state.gameCatProgress + 1;
}, 100);

setInterval(() => {
  if (state.gameCatProgress === 0) {
    state.gameCatIndex = (state.gameCatIndex + 1) % 3;
    if (state.page === '') render();
  }
}, 10000);

// ============================================================
// INIT
// ============================================================
state.page = getPage();
render();
</script>
</body>
</html>
